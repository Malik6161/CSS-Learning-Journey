<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      nav {
        background-color: pink;
        height: 83px;
      }
      .container {
        background-color: red;
        margin: 12px 34px;
        /* height: 233px; */
        text-align: center;
        padding: 55px 23px;
      }
      main {
        background-color: black;
        color: white;
        padding: 10px;
        text-align: center;
      }
      .box1 {
        background-color: pink;
        height: 70vh;
        width: 45%;
        margin: 0 12px;
        display: inline-block;
      }
      .box2 {
        background-color: blue;
        height: 70vh;
        width: 45%;
        margin: 0 12px;
        display: inline-block;
      }
      footer {
        height: 100px;
        background-color: blueviolet;
      }
      .text-box {
        padding: 34px;
        border: 2px solid white;
        margin: 50 34px;
        font-size: 2em;
        border-radius: 34px;
      }

    </style>
  </head>

  <body>
    <header>
      <nav></nav>
    </header>

    <main>
      <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
      </div>
      <div class="text-box">
        <p>That is my first practice of Layouts in CSS jourey.</p>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
