<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Media Queries</title>
    <style>
      body {
        background-color: red;
      }
      @media screen and (orientation: landscape) {
        body {
          border: 2px solid purple;
        }
      }

      /*Most of the time we use this type of media queries*/

      @media only screen and (max-width: 455px) {
        body {
          background-color: blue;
        }
      }
      .boxes {
        height: 100px;
        width: 344px;

        padding: 3px;
        margin: 3px;
        background-color: steelblue;
      }
      .boxes :nth-child(1) {
        border: 2px solid black;
      }
      .boxes :nth-child(2) {
        border: 2px solid black;
        padding: 2px;
        margin: 2px;
      }
      .p{
        font-style: italic;
        color: azure;
      }
    </style>
  </head>
  <body>
    <div>Hey i am a red guy!</div>
    <div class="boxes">
      <div class="box1">i am box 1</div>
      <div class="box2">i am box 2</div>
      <div class="box3">i am box 3</div>
    </div>
    <p class="p">
      If the height is greater than the width than its a potrait but if the
      width is greater than ther height than its a landscape.
    </p>
  </body>
</html>
