<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Properties</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid black;
            display: inline-block;
            padding: 45px;
            margin: 34px;
            justify-content: center;
            background-color: blue;
            text-align: center;
            text-decoration: underline;
        }
        .box1{
            border: 2px solid black;
            display: inline-block;
            padding: 45px;
            margin: 34px;
            display: flex;
            justify-content: center;
            background-color: red;
            text-decoration: underline;
            text-align: center;
    
        }

    </style>
</head>
<body>
    <div class="box">
        I am a box.
    </div>
    <div class="box1">
       lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, voluptatum.quaid azam is a good man. Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, voluptatum.quaid azam is a
    </div>
    <span class="box">
        i am a span <br>
    </span>
    <span class="box1">
        i am 2nd span
    </span>
</body>
</html>
