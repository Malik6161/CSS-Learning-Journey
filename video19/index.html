<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        CSS Fonts, Text & Color Properties 
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Yuyu&display=swap" rel="stylesheet">
    <style>
        h1{
            font-family: 'Roboto', sans-serif;
            font-size: 20px;
            color: black;
        }
        p{
            font-family: 'Arial', sans-serif;
            font-style: italic;
            font: weight 1px;
           
           line-height: 20px;
           letter-spacing: 2px;
        }
        p1{
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif ;
            
        }
        h2{
            text-transform: capitalize;
        }
        h3{
            text-transform: lowercase;
           
        }
    </style>
</head>
<body>
    <div>
        <h1> Fonts </h1>
        <p>this is a video on fonts and <br> we will learn about different font properties </p>
        <P1>this is a video on fonts </P1>
        <h2> text properties </h2>
        <h3>
            Lower case, upper case, capitalize, line height, letter spacing
        </h3>
    </div>
</body>
</html>
