<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- the casecade algorithm  -->
<style>
    /*element selector its specificity is 1*/
    h1 {
        color: red;
    }
    /*the class selector its specificity is 1+10=11*/
    h1.yellow {
        color: yellow;
    }
    /*specificity of the class selector is 10*/
    .cred {
        color: red;
    }
    
    .cpurple {
        color: purple;
    }
</style>

<body>
    <div>
        <h1 class="yellow cred cpurple"> 
            css spacifity
        </h1>
    </div>
</body>

</html>
