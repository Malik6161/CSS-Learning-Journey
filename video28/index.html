<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS position properties</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .parent {
        padding: 443px;
        margin: 34px;
        border: 3px solid black;
      }
      .box {
        height: 133px;
        width: 80vw;
        padding: 3px;
        margin: 3px;

        border: 2px solid black;
      }
      .box1 {
        background-color: blanchedalmond;
        position: absolute; /*nearset position ansistar*/
        top: 0px;
      }

      .box2 {
        background-color: rgb(0, 255, 94);
        /* in relative position i can add top and buttom , left and right property*/
        position: relative;
        top: 34px;
        left: 56px;
      }

      .box3 {
        background-color: rgb(109, 75, 51);
        position: fixed; /*position fixed*/
        bottom: 0px;
        left: 25vw;
        height: 111px;
      }

      .box4 {
        background-color: aqua;
        top: 0px;
        position: sticky;
        height: 111px;
        width: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div class="parent">
      <div class="box box1"></div>
      <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
  </body>
</html>
